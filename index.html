<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyBank Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-hover: #f1f5f9;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --border: #e2e8f0;
      --border-focus: #3b82f6;
      --success: #10b981;
      --success-light: #ecfdf5;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── NAVIGATION ─────────────────────────────── */
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 24px;
    }

    .nav-content {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-main);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--primary);
      color: white;
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      font-size: 1.25rem;
    }

    .nav-tabs {
      display: flex;
      background: var(--bg);
      padding: 4px;
      border-radius: var(--radius);
      gap: 4px;
    }

    .tab-btn {
      border: none;
      background: transparent;
      padding: 8px 16px;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-btn:hover { color: var(--text-main); }
    .tab-btn.active {
      background: var(--surface);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .status-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-badge.synced { background: var(--success-light); color: var(--success); }
    .status-badge.local { background: #fef3c7; color: #d97706; }
    .status-badge.error { background: var(--danger-light); color: var(--danger); }

    /* ─── LAYOUT ────────────────────────────────── */
    .container {
      max-width: 1000px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .view-header {
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .view-title {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .card-body { padding: 24px; }

    /* ─── FORM ─────────────────────────────────── */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 0.9375rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      transition: all 0.2s;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--border-focus);
      background: var(--surface);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ─── OCR ZONE ────────────────────────────── */
    .ocr-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      background: var(--bg);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 24px;
    }

    .ocr-drop:hover, .ocr-drop.drag-over {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .ocr-icon { font-size: 2rem; margin-bottom: 12px; }
    .ocr-text { font-weight: 600; color: var(--text-main); }
    .ocr-sub { font-size: 0.875rem; color: var(--text-muted); margin-top: 4px; }

    /* ─── BUTTONS ──────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      font-size: 0.875rem;
      font-weight: 700;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .btn-secondary {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text-main);
    }

    .btn-secondary:hover { background: var(--surface-hover); }

    .btn-danger {
      background: var(--danger-light);
      color: var(--danger);
    }

    .btn-danger:hover { background: #fee2e2; }

    .btn-sm { padding: 6px 12px; font-size: 0.75rem; }

    /* ─── BROWSE ───────────────────────────────── */
    .q-item {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .q-item:last-child { border-bottom: none; }
    .q-item:hover { background: var(--surface-hover); }

    .q-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .q-text { font-weight: 700; font-size: 1rem; color: var(--text-main); }

    .ans-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .ans-item {
      font-size: 0.875rem;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ans-item.correct {
      background: var(--success-light);
      border-color: var(--success);
      color: var(--success);
      font-weight: 700;
    }

    .letter-badge {
      width: 20px;
      height: 20px;
      background: rgba(0,0,0,0.05);
      border-radius: 4px;
      display: grid;
      place-items: center;
      font-size: 0.7rem;
      font-weight: 800;
    }

    /* ─── QUIZ ─────────────────────────────────── */
    .quiz-card { padding: 40px; text-align: center; }
    .quiz-q { font-size: 1.25rem; font-weight: 800; margin-bottom: 24px; text-align: left; }
    .quiz-opts { display: grid; gap: 12px; }
    .quiz-opt {
      text-align: left;
      padding: 16px 20px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .quiz-opt:hover { border-color: var(--primary); background: var(--primary-light); }
    .quiz-opt.correct { border-color: var(--success); background: var(--success-light); color: var(--success); }
    .quiz-opt.wrong { border-color: var(--danger); background: var(--danger-light); color: var(--danger); }

    .progress {
      height: 8px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ─── UTILS ────────────────────────────────── */
    .hidden { display: none !important; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-main);
      color: white;
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.875rem;
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-12px); }

    @media (max-width: 640px) {
      .options-grid, .ans-list { grid-template-columns: 1fr; }
      .brand span { display: none; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-content">
      <a href="#" class="brand">
        <div class="brand-icon">📚</div>
        <span>StudyBank Pro</span>
      </a>
      <div class="nav-tabs">
        <button class="tab-btn active" data-tab="add">Add</button>
        <button class="tab-btn" data-tab="browse">Bank (<span id="count">0</span>)</button>
        <button class="tab-btn" data-tab="quiz">Quiz</button>
      </div>
      <div id="status" class="status-badge local">Local</div>
    </div>
  </nav>

  <div class="container">
    
    <!-- ADD VIEW -->
    <div id="addView" class="view">
      <div class="view-header">
        <h1 class="view-title" id="formTitle">Add New Question</h1>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-secondary btn-sm" onclick="exportJSON()">Export</button>
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('importFile').click()">Import</button>
          <input type="file" id="importFile" hidden accept=".json" onchange="importJSON(this.files[0])">
        </div>
      </div>

      <div class="ocr-drop" id="dropZone" onclick="document.getElementById('ocrFile').click()">
        <div class="ocr-icon">📸</div>
        <div class="ocr-text">Drop a screenshot here</div>
        <div class="ocr-sub">Or click to scan an image with OCR</div>
        <input type="file" id="ocrFile" hidden accept="image/*" onchange="runOCR(this.files[0])">
      </div>

      <div class="card">
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">Question Text</label>
            <textarea id="qInput" rows="3" placeholder="Enter your question..."></textarea>
          </div>
          <div class="options-grid">
            <div class="form-group">
              <label class="form-label">Option A (or True)</label>
              <input id="ansA" type="text" placeholder="Option A">
            </div>
            <div class="form-group">
              <label class="form-label">Option B (or False)</label>
              <input id="ansB" type="text" placeholder="Option B">
            </div>
            <div class="form-group">
              <label class="form-label">Option C (Optional)</label>
              <input id="ansC" type="text" placeholder="Option C">
            </div>
            <div class="form-group">
              <label class="form-label">Option D (Optional)</label>
              <input id="ansD" type="text" placeholder="Option D">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Correct Answer</label>
            <select id="correctAns">
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>
          <div style="display:flex; gap:12px; margin-top:24px;">
            <button class="btn btn-primary" id="saveBtn" onclick="saveQuestion()">Save Question</button>
            <button class="btn btn-secondary hidden" id="cancelBtn" onclick="resetForm()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- BROWSE VIEW -->
    <div id="browseView" class="view hidden">
      <div class="view-header">
        <h1 class="view-title">Question Bank</h1>
        <div class="form-group" style="margin-bottom:0; width:300px;">
          <input type="text" id="search" placeholder="Search questions..." oninput="renderBrowse()">
        </div>
      </div>
      <div class="card">
        <div id="bankList"></div>
      </div>
    </div>

    <!-- QUIZ VIEW -->
    <div id="quizView" class="view hidden">
      <div class="view-header">
        <h1 class="view-title">Practice Mode</h1>
        <div id="quizStats" class="hidden">
          <span style="font-weight:700; color:var(--primary)" id="scoreText">0 / 0</span>
        </div>
        <button class="btn btn-primary" id="startBtn" onclick="startQuiz()">Start Quiz</button>
      </div>
      <div class="progress"><div class="progress-fill" id="progBar"></div></div>
      <div id="quizContent">
        <div style="text-align:center; padding:60px; color:var(--text-muted)">
          <div style="font-size:3rem; margin-bottom:16px;">🎯</div>
          <p>Click Start to begin practicing your questions.</p>
        </div>
      </div>
    </div>

  </div>

  <div id="toast" class="toast">Message</div>

  <script>
    const STORAGE_KEY = "studybank_pro_v1";
    const firebaseConfig = {
      apiKey: "AIzaSyATUndeZI0qOD-g66UfNAYtU9UPkRrTzKY",
      authDomain: "aahquestionbank.firebaseapp.com",
      projectId: "aahquestionbank",
      storageBucket: "aahquestionbank.firebasestorage.app",
      messagingSenderId: "436069846818",
      appId: "1:436069846818:web:ae91d7508c4d4dcdc35f7b"
    };

    const state = {
      questions: [],
      editingId: null,
      quiz: { active: false, index: 0, score: 0, pool: [] }
    };

    // ── FIREBASE ───────────────────────────────────────────────
    let db = null;
    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      const statusEl = document.getElementById('status');
      db.collection('questions').orderBy('createdAt', 'desc').onSnapshot(snap => {
        state.questions = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        statusEl.textContent = 'Synced';
        statusEl.className = 'status-badge synced';
        renderAll();
      }, err => {
        console.error(err);
        statusEl.textContent = 'Local Only';
        statusEl.className = 'status-badge local';
      });
    } catch(e) { console.warn("Firebase not configured"); }

    // ── CORE LOGIC ─────────────────────────────────────────────
    function saveQuestion() {
      const q = document.getElementById('qInput').value.trim();
      const a = document.getElementById('ansA').value.trim();
      const b = document.getElementById('ansB').value.trim();
      const c = document.getElementById('ansC').value.trim();
      const d = document.getElementById('ansD').value.trim();
      const correct = document.getElementById('correctAns').value;

      if (!q || !a || !b) return showToast("Question and at least 2 answers required");

      const data = {
        question: q,
        answers: { A: a, B: b, C: c, D: d },
        correct: correct,
        createdAt: Date.now()
      };

      if (state.editingId) {
        if (db) {
          db.collection('questions').doc(state.editingId).update(data)
            .then(() => { showToast("Updated successfully"); resetForm(); })
            .catch(e => { console.error(e); showToast("Update failed"); });
        } else {
          const idx = state.questions.findIndex(x => x.id === state.editingId);
          state.questions[idx] = { ...data, id: state.editingId };
          saveLocal(); resetForm(); renderAll();
        }
      } else {
        if (db) {
          db.collection('questions').add(data).then(() => { showToast("Saved to cloud"); resetForm(); });
        } else {
          const newQ = { ...data, id: Date.now().toString() };
          state.questions.unshift(newQ);
          saveLocal(); resetForm(); renderAll();
        }
      }
    }

    function deleteQuestion(id) {
      if (!confirm("Delete this question?")) return;
      if (db) {
        db.collection('questions').doc(id).delete();
      } else {
        state.questions = state.questions.filter(x => x.id !== id);
        saveLocal(); renderAll();
      }
    }

    function editQuestion(id) {
      const q = state.questions.find(x => x.id === id);
      if (!q) return;
      state.editingId = id;
      document.getElementById('qInput').value = q.question;
      document.getElementById('ansA').value = q.answers.A;
      document.getElementById('ansB').value = q.answers.B;
      document.getElementById('ansC').value = q.answers.C;
      document.getElementById('ansD').value = q.answers.D;
      document.getElementById('correctAns').value = q.correct;
      
      document.getElementById('formTitle').textContent = "Edit Question";
      document.getElementById('saveBtn').textContent = "Update Question";
      document.getElementById('cancelBtn').classList.remove('hidden');
      setTab('add');
    }

    function resetForm() {
      state.editingId = null;
      document.getElementById('qInput').value = '';
      document.getElementById('ansA').value = '';
      document.getElementById('ansB').value = '';
      document.getElementById('ansC').value = '';
      document.getElementById('ansD').value = '';
      document.getElementById('correctAns').value = 'A';
      document.getElementById('formTitle').textContent = "Add New Question";
      document.getElementById('saveBtn').textContent = "Save Question";
      document.getElementById('cancelBtn').classList.add('hidden');
    }

    // ── IMPORT/EXPORT ──────────────────────────────────────────
    function exportJSON() {
      const blob = new Blob([JSON.stringify({questions: state.questions}, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'studybank.json'; a.click();
    }

    async function importJSON(file) {
      if (!file) return;
      const text = await file.text();
      try {
        const data = JSON.parse(text);
        const incoming = Array.isArray(data.questions) ? data.questions : [];
        const existingNorm = new Set(state.questions.map(q => q.question.toLowerCase().trim()));
        const toAdd = incoming.filter(q => !existingNorm.has(q.question.toLowerCase().trim()));
        
        if (db && toAdd.length > 0) {
          showToast(`Importing ${toAdd.length} questions...`);
          const batch = db.batch();
          toAdd.forEach(q => {
            const ref = db.collection('questions').doc();
            batch.set(ref, {
              question: q.question,
              answers: q.answers,
              correct: q.correct,
              createdAt: Date.now()
            });
          });
          await batch.commit();
        } else if (!db) {
          state.questions = [...state.questions, ...toAdd];
          saveLocal(); renderAll();
        }
        showToast(`Imported ${toAdd.length} new questions`);
      } catch(e) { showToast("Invalid JSON file"); }
    }

    // ── OCR ────────────────────────────────────────────────────
    async function runOCR(file) {
      if (!file) return;
      showToast("Scanning image...");
      const worker = await Tesseract.createWorker('eng');
      const { data: { text } } = await worker.recognize(file);
      await worker.terminate();
      
      // Simple heuristic for parsing OCR
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 3);
      if (lines.length > 0) {
        document.getElementById('qInput').value = lines[0];
        if (lines.length > 1) document.getElementById('ansA').value = lines[1];
        if (lines.length > 2) document.getElementById('ansB').value = lines[2];
        if (lines.length > 3) document.getElementById('ansC').value = lines[3];
        if (lines.length > 4) document.getElementById('ansD').value = lines[4];
        showToast("OCR complete. Please review.");
      }
    }

    // ── RENDERERS ──────────────────────────────────────────────
    function renderBrowse() {
      const list = document.getElementById('bankList');
      const search = document.getElementById('search').value.toLowerCase();
      const filtered = state.questions.filter(q => q.question.toLowerCase().includes(search));
      
      if (filtered.length === 0) {
        list.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted)">No questions found.</div>';
        return;
      }

      list.innerHTML = filtered.map(q => `
        <div class="q-item">
          <div class="q-header">
            <div class="q-text">${escapeHtml(q.question)}</div>
            <div style="display:flex; gap:8px;">
              <button class="btn btn-secondary btn-sm" onclick="editQuestion('${q.id}')">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteQuestion('${q.id}')">Delete</button>
            </div>
          </div>
          <div class="ans-list">
            ${Object.entries(q.answers).filter(([k,v]) => v).map(([k,v]) => `
              <div class="ans-item ${q.correct === k ? 'correct' : ''}">
                <div class="letter-badge">${k}</div>
                <div>${escapeHtml(v)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function startQuiz() {
      if (state.questions.length === 0) return showToast("Add questions first!");
      state.quiz = {
        active: true,
        index: 0,
        score: 0,
        pool: [...state.questions].sort(() => Math.random() - 0.5)
      };
      document.getElementById('quizStats').classList.remove('hidden');
      document.getElementById('startBtn').textContent = "Restart Quiz";
      renderQuizStep();
    }

    function renderQuizStep() {
      const container = document.getElementById('quizContent');
      const q = state.quiz.pool[state.quiz.index];
      const total = state.quiz.pool.length;
      
      document.getElementById('scoreText').textContent = `${state.quiz.score} / ${total}`;
      document.getElementById('progBar').style.width = `${(state.quiz.index / total) * 100}%`;

      if (state.quiz.index >= total) {
        container.innerHTML = `
          <div class="quiz-card">
            <div style="font-size:4rem; margin-bottom:20px;">🏆</div>
            <h2 style="font-size:2rem; margin-bottom:8px;">Quiz Complete!</h2>
            <p style="color:var(--text-muted); font-size:1.1rem;">You scored ${state.quiz.score} out of ${total}</p>
            <button class="btn btn-primary" style="margin-top:24px;" onclick="startQuiz()">Try Again</button>
          </div>
        `;
        document.getElementById('progBar').style.width = '100%';
        return;
      }

      container.innerHTML = `
        <div class="quiz-card" style="text-align:left;">
          <div class="quiz-q">${escapeHtml(q.question)}</div>
          <div class="quiz-opts">
            ${Object.entries(q.answers).filter(([k,v]) => v).map(([k,v]) => `
              <div class="quiz-opt" onclick="checkAnswer('${k}')" id="opt-${k}">
                <div class="letter-badge" style="width:32px; height:32px; font-size:1rem;">${k}</div>
                <div>${escapeHtml(v)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function checkAnswer(choice) {
      const q = state.quiz.pool[state.quiz.index];
      const opts = document.querySelectorAll('.quiz-opt');
      opts.forEach(o => o.style.pointerEvents = 'none');

      if (choice === q.correct) {
        state.quiz.score++;
        document.getElementById(`opt-${choice}`).classList.add('correct');
      } else {
        document.getElementById(`opt-${choice}`).classList.add('wrong');
        document.getElementById(`opt-${q.correct}`).classList.add('correct');
      }

      setTimeout(() => {
        state.quiz.index++;
        renderQuizStep();
      }, 1500);
    }

    // ── UI HELPERS ─────────────────────────────────────────────
    function setTab(tab) {
      document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
      document.getElementById(tab + 'View').classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
      });
      if (tab === 'browse') renderBrowse();
    }

    function renderAll() {
      document.getElementById('count').textContent = state.questions.length;
      if (document.getElementById('browseView').classList.contains('hidden') === false) renderBrowse();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function saveLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.questions));
    }

    function loadLocal() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) state.questions = JSON.parse(raw);
      renderAll();
    }

    // INIT
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.onclick = () => setTab(b.dataset.tab);
    });
    loadLocal();

    // Drag and Drop
    const dz = document.getElementById('dropZone');
    dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('drag-over'); };
    dz.ondragleave = () => dz.classList.remove('drag-over');
    dz.ondrop = (e) => {
      e.preventDefault();
      dz.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) runOCR(e.dataTransfer.files[0]);
    };
  </script>
</body>
</html>
